version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "next"
        versions: ["> 16.x"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
