name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Job 1: Type-check all packages ──────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check backend
        run: npm run type-check -w backend

      - name: Type check frontend
        run: npm run type-check -w frontend

      - name: Type check admin-frontend
        run: npm run type-check -w admin-frontend

  # ── Job 2: Backend unit tests ────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        run: npm run test:ci -w backend

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: backend/coverage/
          retention-days: 7

  # ── Job 3: Architecture guardrails ──────────────────────────────────────────
  architecture-guard:
    name: Architecture Guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint repository
        run: npm run lint

      - name: Duplicate code detection
        run: npm run guard:duplication

      - name: API surface SSOT guard
        run: npm run guard:api-surface

      - name: Ad placement SSOT guard
        run: npm run guard:ad-ssot

      - name: Route collision guard
        run: npm run guard:route-collision

      - name: Platform governance guard
        run: npm run guard:platform-governance

      - name: Guardrail failure hints
        if: always()
        run: |
          echo "Architecture guards completed. Review logs above for any HINT blocks if failure occurred."

      - name: Upload duplication report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jscpd-report
          path: .jscpd-report/
          retention-days: 7

  # ── Job 4: Build verification ───────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build -w backend

      - name: Build frontend
        run: npm run build -w frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.esparex.in

      - name: Build admin-frontend
        run: npm run build -w admin-frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.esparex.in
