name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  # ── Job 1: Type-check all packages ──────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check backend
        run: npm run type-check -w backend

      - name: Type check frontend
        run: npm run type-check -w frontend

      - name: Type check admin-frontend
        run: npm run type-check -w admin-frontend

  # ── Job 2: Backend unit tests ────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        run: npm run test:ci -w backend

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: backend/coverage/
          retention-days: 7

  # ── Job 3: Architecture guardrails ──────────────────────────────────────────
  architecture-guard:
    name: Architecture Guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint repository
        run: npm run lint

      - name: Route collision guard
        run: node scripts/enforce-route-collision-guard.js

      - name: Ad SSOT guard
        run: node scripts/enforce-ad-ssot-guard.js

      - name: Dead import protection
        run: npm run guard:unused-imports

      - name: Duplicate code detection
        run: npm run guard:duplication

      - name: API surface SSOT guard
        run: npm run guard:api-surface

      - name: Guardrail failure hints
        if: failure()
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Architecture guardrails failed."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Possible causes:"
          echo "  • Duplicate API route — use canonical /api/v1/<resource>"
          echo "  • Reserved slug collision detected"
          echo "  • Duplicate hook family detected"
          echo "  • Unused import introduced"
          echo "  • Duplicated code block above threshold"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ── Job 4: Build verification (frontend + admin) ────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    # Only run full build on main pushes to save CI minutes on PRs
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build -w backend

      - name: Build frontend
        run: npm run build -w frontend
        env:
          # Dummy values so Next.js build doesn't fail on missing env
          NEXT_PUBLIC_API_URL: https://api.esparex.in

      - name: Build admin-frontend
        run: npm run build -w admin-frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.esparex.in
