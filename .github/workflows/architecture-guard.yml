name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Job 1: Type-check all packages ──────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Create .env for user-backend
        run: |
          echo "NODE_ENV=test" > user-backend/.env
          echo "MONGODB_URI=mongodb://127.0.0.1:27017/esparex_test" >> user-backend/.env
          echo "ADMIN_MONGODB_URI=mongodb://127.0.0.1:27017/esparex_test" >> user-backend/.env
          echo "JWT_SECRET=ci_test_secret_at_least_32_characters_long_for_validation_safety" >> user-backend/.env
          echo "LOG_LEVEL=info" >> user-backend/.env

      - name: Type check
        run: npm run type-check

  # ── Job 2: Backend unit tests ────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Create .env for user-backend tests
        run: |
          echo "NODE_ENV=test" > user-backend/.env
          echo "MONGODB_URI=mongodb://127.0.0.1:27017/esparex_test" >> user-backend/.env
          echo "ADMIN_MONGODB_URI=mongodb://127.0.0.1:27017/esparex_test" >> user-backend/.env
          echo "JWT_SECRET=ci_test_secret_at_least_32_characters_long_for_validation_safety" >> user-backend/.env
          echo "LOG_LEVEL=info" >> user-backend/.env

      - name: Run user-backend tests
        run: npm run test:ci -w user-backend

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: user-backend/coverage/
          retention-days: 7
          if-no-files-found: ignore

  # ── Job 3: Architecture guardrails ──────────────────────────────────────────
  architecture-guard:
    name: Architecture Guardrails
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Create .env for user-backend guards
        run: |
          echo "NODE_ENV=test" > user-backend/.env
          echo "MONGODB_URI=mongodb://127.0.0.1:27017/esparex_test" >> user-backend/.env
          echo "ADMIN_MONGODB_URI=mongodb://127.0.0.1:27017/esparex_test" >> user-backend/.env
          echo "JWT_SECRET=ci_test_secret_at_least_32_characters_long_for_validation_safety" >> user-backend/.env
          echo "LOG_LEVEL=info" >> user-backend/.env

      - name: Lint repository
        run: npm run lint

      - name: Duplicate code detection
        run: npm run guard:duplication

      - name: API surface SSOT guard
        run: npm run guard:api-surface

      - name: Ad placement SSOT guard
        run: npm run guard:ad-ssot

      - name: Route collision guard
        run: npm run guard:route-collision

      - name: Platform governance guard
        run: npm run guard:platform-governance

      - name: Guardrail failure hints
        if: always()
        run: |
          echo "Architecture guards completed. Review logs above for any HINT blocks if failure occurred."

      - name: Upload duplication report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jscpd-report
          path: .jscpd-report/
          retention-days: 7
          if-no-files-found: ignore

  # ── Job 4: Build verification ───────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Create .env for user-backend build
        run: |
          echo "NODE_ENV=test" > user-backend/.env
          echo "MONGODB_URI=mongodb://127.0.0.1:27017/esparex_test" >> user-backend/.env
          echo "ADMIN_MONGODB_URI=mongodb://127.0.0.1:27017/esparex_test" >> user-backend/.env
          echo "JWT_SECRET=ci_test_secret_at_least_32_characters_long_for_validation_safety" >> user-backend/.env
          echo "LOG_LEVEL=info" >> user-backend/.env

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_ADMIN_API_URL: https://api.esparex.in/api/v1/admin
          NEXT_PUBLIC_API_URL: https://api.esparex.in/api/v1
          NEXT_PUBLIC_APP_URL: https://esparex.in
          NEXT_PUBLIC_ENCRYPTION_KEY: ci-placeholder-key-32-characters-x
          NEXT_PUBLIC_USE_DEFAULT_OTP: "false"
          NEXT_PUBLIC_LOCAL_DEV_AUTH: "false"
          NEXT_PUBLIC_FIREBASE_API_KEY: placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: placeholder
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: placeholder.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:placeholder"
          NEXT_PUBLIC_FIREBASE_VAPID_KEY: placeholder
