name: Duplication Guard

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'backend/src/**'
      - 'frontend/src/**'
      - 'admin-frontend/src/**'
      - '.jscpd.json'

  push:
    branches:
      - main
      - develop

jobs:
  duplication-check:
    name: Code Duplication Check (≤ 1%)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install jscpd
        run: npm install -g jscpd

      - name: Run duplication guard
        run: npx jscpd --config .jscpd.json
        # Exits with code 1 if threshold exceeded — fails the CI job

      - name: Upload jscpd report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jscpd-report
          path: .jscpd-report/
          retention-days: 7
