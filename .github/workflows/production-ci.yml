name: 🛡️ Esparex CI: Production Hardened

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: 🏗️ Setup & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm
      
      - name: 🛡️ Secure Dependencies
        # Using a retry wrapper for resilience against network flakiness
        run: |
          for i in {1..3}; do npm ci && break || sleep 10; done

      - name: 🛡️ Dependency Audit
        # Level critical to prevent builds from failing on non-breaking issues
        # while catching severe security threats.
        run: npm audit --audit-level=critical

  lint:
    name: 🧹 Parallel Lint
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        scope: [web, admin, backend, core, shared]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm
      
      - name: Restore dependencies
        run: |
          for i in {1..3}; do npm ci && break || sleep 10; done

      - name: Restore ESLint Cache
        uses: actions/cache@v4
        with:
          path: .eslintcache/${{ matrix.scope }}
          key: ${{ runner.os }}-eslint-${{ matrix.scope }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-eslint-${{ matrix.scope }}-

      - name: Run Scoped Lint (JSON + GitHub Format)
        # We output JSON for the baseline analyzer AND use github format for inline PR annotations
        run: |
          npm run lint:${{ matrix.scope }} -- --format json --output-file lint-${{ matrix.scope }}.json || true
          npm run lint:${{ matrix.scope }} -- --format github || true

      - name: Upload Lint Results
        uses: actions/upload-artifact@v4
        with:
          name: lint-results-${{ matrix.scope }}
          path: lint-${{ matrix.scope }}.json

  governance:
    name: 🛡️ Governance firewall
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🛡️ Absolute Baseline Immutability
        # Hard block on baseline modification in PRs to prevent debt bypass
        if: github.event_name == 'pull_request'
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "eslint-baseline.json"; then
            echo "❌ GOVERNANCE FAILURE: Unauthorized modification of eslint-baseline.json detected."
            echo "Technical debt baselines are IMMUTABLE in PRs. Use remediation branches for debt updates."
            exit 1
          fi

      - name: 🛡️ Configuration-Independent Hard Guard
        # Enforce architectural invariants bypassing local config entirely.
        # This rule is NON-NEGOTIABLE and cannot be disabled in code or config.
        run: |
          npx eslint . \
            --no-eslintrc \
            --rule "esparex/no-status-mutation-outside-status-mutation-service:error" \
            --rule "react-hooks/rules-of-hooks:error" \
            --no-ignore

      - name: 🔍 Baseline Analysis
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm
      
      - name: Download Results
        uses: actions/download-artifact@v4
        with:
          path: lint-artifacts
          pattern: lint-results-*
          merge-multiple: true

      - name: Merge & Enforce Baseline
        run: |
          echo "[" > ci-lint-results.json
          cat lint-artifacts/lint-*.json | sed 's/^\[//;s/\]$//' | sed '/^$/d' | paste -sd "," - >> ci-lint-results.json
          echo "]" >> ci-lint-results.json
          if [ "$(cat ci-lint-results.json)" == "[,]" ]; then echo "[]" > ci-lint-results.json; fi
          node scripts/lint-baseline-enforcement.js ci-lint-results.json

      - name: Architecture Guardrails
        run: |
          npm run guard:api-surface
          npm run guard:ad-ssot
          npm run guard:route-collision
          npm run guard:platform-governance

  type-check:
    name: 🟦 Type safety
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm
      - name: Restore dependencies
        run: |
          for i in {1..3}; do npm ci && break || sleep 10; done
      - name: Run Type Check
        run: npm run type-check

  build-verify:
    name: 🏗️ Build integrity
    # Build verification on main pushes or when explicitly requested
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'needs-build')
    needs: [governance, type-check]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ["@esparex/backend-user", "@esparex/apps-admin", "@esparex/apps-web"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm
      - name: Restore dependencies
        run: |
          for i in {1..3}; do npm ci && break || sleep 10; done
      - name: Build
        run: npm run build -w ${{ matrix.app }}
        env:
          NEXT_PUBLIC_ADMIN_API_URL: https://api.esparex.in/api/v1/admin
          NEXT_PUBLIC_API_URL: https://api.esparex.in/api/v1
          NEXT_PUBLIC_APP_URL: https://esparex.in
          NEXT_PUBLIC_ENCRYPTION_KEY: ci-placeholder-key-32-characters-x
      
      - name: 🛡️ Artifact Integrity Check
        # Verify build success by checking for expected output directories
        run: |
          if [[ "${{ matrix.app }}" == "@esparex/apps-web" ]]; then test -d apps/web/.next || exit 1; fi
          if [[ "${{ matrix.app }}" == "@esparex/backend-user" ]]; then test -d backend/user/dist || exit 1; fi
          if [[ "${{ matrix.app }}" == "@esparex/apps-admin" ]]; then test -d apps/admin/.next || exit 1; fi
