name: "Close Stale Issues and PRs"

on:
  schedule:
    - cron: "0 2 * * *" # Run daily at 2am

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: 'This issue has been automatically marked as stale because it has not had recent activity. It will be closed if no further activity occurs. Thank you for your contributions.'
          stale-pr-message: 'This PR has been automatically marked as stale because it has not had recent activity. It will be closed if no further activity occurs. Please comment if you want to keep it open.'
          days-before-stale: 60
          days-before-close: 7
          exempt-issue-labels: 'bug,security,help wanted,pinned'
          exempt-pr-labels: 'security,pinned'
