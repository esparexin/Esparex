name: Production CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# 🛡️ Concurrency Control: Cancel in-progress runs on same branch
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: 🏗️ Setup & Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: npm
      
      - name: Install dependencies
        run: npm ci

      - name: Dependency Security Audit
        # Audit level high to catch critical supply chain risks
        run: npm audit --audit-level=high

  lint:
    name: 🧹 Parallel Lint
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true # Fail fast to save compute costs
      matrix:
        scope: [web, backend, core, shared]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: npm
      
      - name: Install dependencies
        run: npm ci

      - name: Restore ESLint Cache
        uses: actions/cache@v4
        with:
          path: .eslintcache/${{ matrix.scope }}
          key: ${{ runner.os }}-eslint-${{ matrix.scope }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-eslint-${{ matrix.scope }}-

      - name: Run Scoped Lint
        run: npm run lint:${{ matrix.scope }} -- --format json --output-file lint-${{ matrix.scope }}.json || true

      - name: Upload Lint Results
        uses: actions/upload-artifact@v4
        with:
          name: lint-results-${{ matrix.scope }}
          path: lint-${{ matrix.scope }}.json

  governance:
    name: 🛡️ Governance Gate
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for git diff checks

      - name: 🛡️ Baseline Integrity Protection
        # Prevent devs from bypassing debt by regenerating the baseline in a PR
        if: github.event_name == 'pull_request'
        run: |
          if git diff --name-only origin/${{ github.base_ref }} | grep -q "eslint-baseline.json"; then
            echo "❌ GOVERNANCE FAILURE: Unauthorized modification of eslint-baseline.json detected."
            echo "Technical debt baselines can only be updated via approved architectural remediation PRs."
            exit 1
          fi

      - name: 🛡️ Hard Governance Guard (Critical Rules)
        # INDEPENDENT check for organizational invariants. Baseline is irrelevant here.
        # This rule MUST fail CI even if suppressed or baselined.
        run: |
          npx eslint . --rule "esparex/no-status-mutation-outside-status-mutation-service:error" \
                       --rule "react-hooks/rules-of-hooks:error" \
                       --no-eslintrc --no-ignore # bypass local config to ensure enforcement

      - name: 🔍 Baseline Debt Analysis
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: npm
      
      - name: Download Results
        uses: actions/download-artifact@v4
        with:
          path: lint-artifacts
          pattern: lint-results-*
          merge-multiple: true

      - name: Merge & Enforce Baseline
        run: |
          echo "[" > ci-lint-results.json
          cat lint-artifacts/lint-*.json | sed 's/^\[//;s/\]$//' | sed '/^$/d' | paste -sd "," - >> ci-lint-results.json
          echo "]" >> ci-lint-results.json
          if [ "$(cat ci-lint-results.json)" == "[,]" ]; then echo "[]" > ci-lint-results.json; fi
          node scripts/lint-baseline-enforcement.js ci-lint-results.json

      - name: Architecture Invariants
        run: |
          npm run guard:api-surface
          npm run guard:ad-ssot
          npm run guard:route-collision
          npm run guard:platform-governance

  type-check:
    name: 🟦 Type Safety
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run Type Check
        run: npm run type-check

  build-verify:
    name: 🏗️ Build Verification
    # Only run full build on main branch or for build-related PRs to save time
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'needs-build')
    needs: [governance, type-check]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ["@esparex/backend-user", "@esparex/apps-admin", "@esparex/apps-web"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build Verification
        run: npm run build -w ${{ matrix.app }}
        env:
          NEXT_PUBLIC_ADMIN_API_URL: https://api.esparex.in/api/v1/admin
          NEXT_PUBLIC_API_URL: https://api.esparex.in/api/v1
          NEXT_PUBLIC_APP_URL: https://esparex.in
          NEXT_PUBLIC_ENCRYPTION_KEY: ci-placeholder-key-32-characters-x
