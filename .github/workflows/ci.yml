name: Esparex CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_APP_ENV: local
  NEXT_PUBLIC_PROD_RISK_OVERRIDE: "false"
  SKIP_ENV_VALIDATION: "true"
  NEXT_PUBLIC_API_URL: https://api.esparex.in/api/v1
  NEXT_PUBLIC_APP_URL: https://esparex.in
  NEXT_PUBLIC_FIREBASE_API_KEY: placeholder
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: placeholder
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: placeholder.appspot.com
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
  NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:placeholder"
  NEXT_PUBLIC_FIREBASE_VAPID_KEY: placeholder

jobs:
  # ── Job 1: Static Analysis ─────────────────────────────────────────
  static-analysis:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: HUSKY=0 npm ci
      - run: npm run guard:env-contracts
      - run: npm run lint
      - run: npm run type-check

  # ── Job 2: Test Matrix ─────────────────────────────────────────────
  test:
    name: Test (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: static-analysis
    strategy:
      fail-fast: false
      matrix:
        workspace: 
          - "@esparex/backend-user"
          - "@esparex/core"
          - "@esparex/repository-governance"
          - "@esparex/apps-admin"
    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: HUSKY=0 npm ci
      - run: npm test -w ${{ matrix.workspace }}

  # ── Job 3: Build Matrix ────────────────────────────────────────────
  build:
    name: Build (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: static-analysis
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - "@esparex/shared"
          - "@esparex/core"
          - "@esparex/backend-user"
          - "@esparex/apps-admin"
          - "@esparex/apps-web"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: HUSKY=0 npm ci
      - run: npm run build -w ${{ matrix.workspace }}

  # ── Job 4: Governance Guards ───────────────────────────────────────
  governance:
    name: Governance Guards
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: static-analysis
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: HUSKY=0 npm ci
      - run: npm run guard:duplicate-code
      - run: npm run guard:dead-code
      - run: npm run governance:guards
      - run: npm run architecture:check

  # ── Job 2: Security audit (no build artifacts needed) ────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: HUSKY=0 npm ci
      - name: npm audit
        run: npm audit --audit-level=high
        # Informational until active-dependency vulnerabilities are resolved
        continue-on-error: true

  # ── Job 3: PR Impact Analysis (no build artifacts needed) ────────────────────
  pr-impact:
    name: PR Impact Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    needs: ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: HUSKY=0 npm ci
      - name: Validate PR impact analysis
        run: node scripts/enforce-pr-impact-analysis.js
        env:
          PR_BODY: ${{ github.event.pull_request.body }}

  # ── Job 4: Playwright E2E — Listing Edit regression suite ────────────────────
  e2e-listing-edit:
    name: E2E – Listing Edit Suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: ci
    env:
      NEXT_PUBLIC_LOCAL_DEV_AUTH: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: HUSKY=0 npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web
      - name: Build web app
        run: npm run build -w @esparex/apps-web
      - name: Start web app
        run: npm run start -w @esparex/apps-web &
        env:
          PORT: 3000
      - name: Wait for server to be ready
        run: npx wait-on http://localhost:3000 --timeout 60000
      - name: Run Listing Edit E2E suite
        run: npx playwright test tests/edit-listing.spec.ts --project=chromium --workers=1
        working-directory: apps/web
      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-listing-edit
          path: apps/web/test-results/
          retention-days: 7
