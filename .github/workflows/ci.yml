name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: Build & Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Build Core Dependencies (Required for SSOT resolution) ──
      - name: Build @esparex/shared
        run: npm run build -w @esparex/shared

      - name: Build @esparex/core
        run: npm run build -w core

      # ── Quality Gates (SSOT) ──
      - name: Run CI Suite (Lint, Type-check, Duplication)
        run: npm run ci

      # ── Architecture Guardrails ──
      - name: Architecture Guardrails
        run: |
          npm run guard:api-surface
          npm run guard:ad-ssot
          npm run guard:route-collision
          npm run guard:platform-governance

      # ── Build Verification ──
      - name: Build Backend (@esparex/backend-user)
        run: npm run build -w @esparex/backend-user

      - name: Build Admin Frontend (@esparex/apps-admin)
        run: npm run build -w @esparex/apps-admin
        env:
          NEXT_PUBLIC_ADMIN_API_URL: https://api.esparex.in/api/v1/admin

      - name: Build Frontend (@esparex/apps-web)
        run: npm run build -w @esparex/apps-web
        env:
          NEXT_PUBLIC_API_URL: https://api.esparex.in/api/v1
          NEXT_PUBLIC_APP_URL: https://esparex.in
          NEXT_PUBLIC_ENCRYPTION_KEY: ci-placeholder-key-32-characters-x
          NEXT_PUBLIC_USE_DEFAULT_OTP: "false"
          NEXT_PUBLIC_LOCAL_DEV_AUTH: "false"
          NEXT_PUBLIC_FIREBASE_API_KEY: placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: placeholder
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: placeholder.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:placeholder"
          NEXT_PUBLIC_FIREBASE_VAPID_KEY: placeholder
