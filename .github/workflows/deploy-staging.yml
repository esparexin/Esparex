name: Deploy Staging

on:
  push:
    branches:
      - develop

env:
  NODE_ENV: staging

jobs:
  build-and-guard:
    name: Build & CI Guard (Staging)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Build All Workspaces
        run: npm run build

      - name: Run CI Guard
        run: ./scripts/ci-guard.sh

  deploy:
    name: Deploy to Render (Staging)
    needs: build-and-guard
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user-backend, admin-backend, user-frontend, admin-frontend]
      fail-fast: false # Deploy independently; one failure shouldn't cancel others

    steps:
      - name: Trigger Render Deploy Hook
        # Requires repository secrets for each service's Render deploy hook
        run: |
          SERVICE_CLEAN=$(echo "${{ matrix.service }}" | tr '-' '_' | tr '[:lower:]' '[:upper:]')
          HOOK_URL_SECRET_NAME="RENDER_DEPLOY_HOOK_STAGING_${SERVICE_CLEAN}"
          HOOK_URL="${!HOOK_URL_SECRET_NAME}"
          
          if [ -z "$HOOK_URL" ]; then
            echo "Skipping deploy: Deploy hook secret not found for ${{ matrix.service }} staging."
            exit 0
          fi
          
          echo "Triggering deploy for ${{ matrix.service }}..."
          curl -sS -X POST "$HOOK_URL" -o deploy_response.json
          cat deploy_response.json

  validate:
    name: Validate Deployment (Staging)
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Health Check User Backend
        run: |
          URL="${{ secrets.STAGING_USER_BACKEND_URL }}"
          if [ -n "$URL" ]; then
            curl -f -sS --retry 5 --retry-delay 10 "$URL/" || exit 1
          fi

      - name: Health Check Admin Backend
        run: |
          URL="${{ secrets.STAGING_ADMIN_BACKEND_URL }}"
          if [ -n "$URL" ]; then
            curl -f -sS --retry 5 --retry-delay 10 "$URL/health" || exit 1
          fi
