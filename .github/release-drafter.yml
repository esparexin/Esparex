name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'bug'
      - 'fix'
  - title: '🛡️ Security'
    labels:
      - 'security'
  - title: '🛠 Refactoring'
    labels:
      - 'refactor'
  - title: '⚡ Performance'
    labels:
      - 'performance'
  - title: '📝 Documentation'
    labels:
      - 'documentation'
  - title: '📦 Dependencies'
    labels:
      - 'dependencies'
  - title: '🏗 CI/CD'
    labels:
      - 'ci'
      - 'github_actions'
exclude-labels:
  - 'chore'
  - 'style'
  - 'test'
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
template: |
  ## What's Changed

  $CHANGES
