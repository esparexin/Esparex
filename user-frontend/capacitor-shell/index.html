<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Esparex Mobile</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(37, 99, 235, 0.12), transparent 34%),
          linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      }

      main {
        width: min(92vw, 32rem);
        padding: 2rem;
        border-radius: 1.5rem;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(148, 163, 184, 0.2);
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.5rem;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #334155;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Esparex mobile shell</h1>
      <p>
        This native wrapper is configured to load the hosted Esparex web app.
        Set <code>CAPACITOR_SERVER_URL</code> to a real HTTPS app origin before
        building Android or iOS releases.
      </p>
    </main>
  </body>
  </html>
