services:
  # --- Esparex Backend (Node.js API) ---
  - type: web
    name: esparex-backend
    env: node
    rootDir: backend
    plan: free # Change to 'starter' or higher for production traffic
    # Updated build and start commands to match Esparex package.json structure
    buildCommand: npm install && npm run build
    startCommand: node -r tsconfig-paths/register dist/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false # Set this in the Render Dashboard for security
      - key: JWT_SECRET
        sync: false # Set this in the Render Dashboard for security
      - key: CORS_ORIGIN
        sync: false # Set this in the Render Dashboard: https://esparex.in
