services:
  # --- Esparex Backend (Node.js API) ---
  - type: web
    name: esparex-backend
    env: node
    plan: free # Change to 'starter' or higher for production traffic
    # Build from repo root so npm workspaces links @esparex/shared correctly
    buildCommand: npm install --include=dev && npm run build -w backend
    startCommand: cd backend && node -r ./register.js dist/backend/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

      # ── Core ──────────────────────────────────────────────────────────────
      - key: MONGODB_URI
        sync: false   # MongoDB Atlas connection string
      - key: ADMIN_MONGODB_URI
        sync: false   # Admin DB — same Atlas cluster, separate connection (REQUIRED — crashes without it)
      - key: JWT_SECRET
        sync: false   # Strong random string (64+ chars in production)
      - key: ADMIN_JWT_SECRET
        sync: false   # Separate secret for admin panel JWTs
      - key: REFRESH_TOKEN_SECRET
        sync: false   # Separate secret for refresh tokens
      - key: OTP_HASH_SECRET
        sync: false   # Strong random string for OTP hashing (32+ chars)

      # ── Redis (required in production) ────────────────────────────────────
      - key: REDIS_URL
        sync: false   # e.g. rediss://:<password>@<host>:6379 (Upstash / Render Redis)

      # ── CORS & Cookie ─────────────────────────────────────────────────────
      - key: CORS_ORIGIN
        sync: false   # e.g. https://esparex.in,https://admin.esparex.in
      - key: COOKIE_DOMAIN
        sync: false   # e.g. .esparex.in  (leading dot covers all subdomains)
      - key: FRONTEND_URL
        sync: false   # e.g. https://esparex.in
      - key: FRONTEND_INTERNAL_URL
        sync: false   # Same as FRONTEND_URL unless behind internal network
      - key: ADMIN_URL
        sync: false   # e.g. https://admin.esparex.in (used for cookie domain inference)
      - key: ADMIN_FRONTEND_URL
        sync: false   # e.g. https://admin.esparex.in

      # ── AWS / S3 (required when any S3 var is present) ────────────────────
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false   # e.g. ap-south-1
      - key: S3_BUCKET_NAME
        sync: false   # canonical bucket name (replaces legacy AWS_S3_BUCKET)

      # ── Firebase (push notifications) ────────────────────────────────────
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false   # Paste the full service account JSON as a single-line string

      # ── SMS / OTP (MSG91) ─────────────────────────────────────────────────
      - key: MSG91_AUTH_KEY
        sync: false
      - key: MSG91_SENDER_ID
        sync: false

      # ── AI Features ───────────────────────────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false

      # ── Payments ──────────────────────────────────────────────────────────
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false

      # ── Optional / feature flags ──────────────────────────────────────────
      - key: USE_DEFAULT_OTP
        value: "false"   # MUST be false in production
      - key: ATLAS_LOCATION_SEARCH_INDEX
        sync: false   # Atlas Search index name (default: location_autocomplete)

  # --- Keep-alive cron (prevents free-tier cold starts) ---
  - type: cron
    name: esparex-keepalive
    env: node
    schedule: "*/10 * * * *"
    buildCommand: "echo 'no build needed'"
    startCommand: >
      node -e "
        const https = require('https');
        https.get('https://api.esparex.in/health', (res) => {
          console.log('ping status:', res.statusCode);
        }).on('error', (e) => {
          console.error('ping failed:', e.message);
          process.exit(1);
        });
      "
